<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCSA Comprehensive Dynamic Exam Simulator</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #ffffff;
            --primary-color: #0066cc;
            --primary-hover: #004c99;
            --text-color: #333333;
            --border-color: #dddddd;
            --success-color: #2e7d32;
            --error-color: #c62828;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: var(--container-bg);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
        }
        h1 { margin-top: 0; border-bottom: 2px solid var(--border-color); padding-bottom: 8px;}
        .meta-bar {
            display: flex;
            justify-content: space-between;
            background: #f8f9fa;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-weight: bold;
            border: 1px solid var(--border-color);
        }
        .timer { color: var(--error-color); }
        .domain-tag {
            display: inline-block;
            background: #e1f5fe;
            color: #0288d1;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .question-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 15px; }
        pre {
            background: #272822;
            color: #f8f8f2;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            font-family: monospace;
            font-size: 0.85rem;
        }
        .options-list { list-style: none; padding: 0; }
        .option-item { margin-bottom: 8px; }
        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
        }
        .option-label:hover { background-color: #f1f8ff; }
        .option-label input { margin-top: 4px; margin-right: 10px; }
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.95rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .navigation-btns { display: flex; justify-content: space-between; margin-top: 20px; }
        .explanation-box { margin-top: 15px; padding: 12px; border-radius: 4px; display: none; }
        .explanation-box.correct { background-color: #e8f5e9; border-left: 4px solid var(--success-color); }
        .explanation-box.incorrect { background-color: #ffebee; border-left: 4px solid var(--error-color); }
        .results-screen { display: none; }
        .domain-score-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .domain-score-table th, .domain-score-table td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
        .domain-score-table th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <div id="quiz-screen">
        <h1>KCSA Full Exam Simulator</h1>
        <div class="meta-bar">
            <div>Question <span id="current-q-num">1</span> of 60</div>
            <div class="timer">Time Remaining: <span id="timer-display">90:00</span></div>
        </div>
        <div id="question-container"></div>
        <div class="navigation-btns">
            <button class="btn" id="prev-btn" onclick="prevQuestion()" disabled>Previous</button>
            <button class="btn" id="action-btn" onclick="handleActionClick()">Submit Answer</button>
        </div>
    </div>

    <div id="results-screen" class="results-screen">
        <h1>Exam Evaluation Results</h1>
        <div class="meta-bar">
            <div>Final Score: <span id="final-score">0%</span></div>
            <div id="pass-fail-status"></div>
        </div>
        <p>A minimum score of <strong>75%</strong> is required to pass the official KCSA exam.</p>
        <h3>Performance Breakdown by Domain</h3>
        <table class="domain-score-table" id="breakdown-table">
            <thead>
                <tr><th>Exam Domain</th><th>Correct / Total</th><th>Percentage</th></tr>
            </thead>
            <tbody></tbody>
        </table>
        <br><button class="btn" onclick="window.location.reload()">Start New Randomized Session</button>
    </div>
</div>

        {

        // === DOMAIN 6: COMPLIANCE AND SECURITY FRAMEWORKS (10% -> Target 6 Questions) ===
        {

            explanation: "Kube-bench is an open-source tool that tests Kubernetes deployments against the official CIS configuration recommendations."
        },
        {
            domain: "Compliance and Security Frameworks (10%)",
            question: "Which tool scans a cluster externally or internally to discover potential configuration weaknesses and attack surfaces?",
            options: ["Kube-hunter", "Kube-bench", "Trivy", "Cosign"],
            answer: "Kube-hunter",
            explanation: "Kube-hunter actively searches for security vulnerabilities and weaknesses in Kubernetes clusters from an attacker's perspective."
        },
        {
            domain: "Compliance and Security Frameworks (10%)",
            question: "What is the primary goal of compliance frameworks like SOC 2 or ISO 27001 in a cloud-native organization?",
            options: ["To independently verify that security controls and operational processes meet established standards", "To automatically upgrade application dependencies", "To optimize cluster CPU and memory distribution", "To eliminate the need for container runtime insulation"],

        },

        },

            domain: "Compliance and Security Frameworks (10%)",
            question: "Which framework provides a curated database of real-world adversary tactics, techniques, and mitigation strategies?",

            explanation: "The MITRE ATT&CK framework documents real-world adversary tactics and techniques to help organizations analyze their defensive postures."
        },
        {
            domain: "Compliance and Security Frameworks (10%)",
            question: "Why is regular auditing of Kubernetes RBAC bindings required for continuous compliance?",
            options: ["To prevent permission creep and identify over-permissioned identities", "To automatically clear dead etcd data records", "To maintain optimal network routing speeds", "To ensure container image signatures stay valid over time"],
            answer: "To prevent permission creep and identify over-permissioned identities",
            explanation: "Regular RBAC reviews help ensure the principle of least privilege by identifying and removing unnecessary permissions."
        },
        {
            domain: "Compliance and Security Frameworks (10%)",
            question: "What does the 'T' in STRIDE signify when designing cloud-native component boundaries?",
            options: ["Tampering", "Telemetry Failures", "Transport Isolation", "Token Leaks"],
            answer: "Tampering",
            explanation: "STRIDE stands for Spoofing, Tampering, Repudiation, Information Disclosure, Denial of Service, and Elevation of privilege."
        }
    ];

    // Blueprint configuration matching the exact KCSA breakdown targets (Total: 60 Qs)
    const blueprint = [
        { domain: "Overview of Cloud Native Security (14%)", count: 8 },
        { domain: "Kubernetes Cluster Component Security (22%)", count: 13 },
        { domain: "Kubernetes Security Fundamentals (22%)", count: 13 },
        { domain: "Kubernetes Threat Model (16%)", count: 10 },
        { domain: "Platform Security (16%)", count: 10 },
        { domain: "Compliance and Security Frameworks (10%)", count: 6 }
    ];

    let sessionQuestions = [];
    let currentQuestionIndex = 0;
    let userAnswers = [];
    let stateSubmitted = [];
    let totalSeconds = 90 * 60; 
    let timerInterval;

    // Helper functions to handle shuffling and assembly
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
    }

    function assembleExamSession() {
        sessionQuestions = [];
        
        blueprint.forEach(target => {
            // Filter all entries matching the requested domain
            let matches = questionDatabase.filter(q => q.domain === target.domain);
            shuffleArray(matches);
            
            // Slice the required amount and push to current session list
            let selected = matches.slice(0, target.count);
            sessionQuestions = sessionQuestions.concat(selected);
        });

        // Shuffle the final array so domains are mixed naturally throughout the session
        shuffleArray(sessionQuestions);
        
        // Initialize parallel response states
        userAnswers = new Array(sessionQuestions.length).fill(null);
        stateSubmitted = new Array(sessionQuestions.length).fill(false);
    }

    function initQuiz() {
        assembleExamSession();
        startTimer();
        showQuestion();
    }

    function startTimer() {
        timerInterval = setInterval(() => {
            if (totalSeconds <= 0) {
                clearInterval(timerInterval);
                alert("Time has expired! Evaluating your exam results.");
                calculateResults();
                return;
            }
            totalSeconds--;
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            document.getElementById('timer-display').innerText = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function showQuestion() {
        const q = sessionQuestions[currentQuestionIndex];
        document.getElementById('current-q-num').innerText = currentQuestionIndex + 1;
        
        let html = `
            <span class="domain-tag">${q.domain}</span>
            <div class="question-text">${currentQuestionIndex + 1}. ${q.question}</div>
        `;
        
        if (q.code) {
            html += `<pre><code>${escapeHtml(q.code)}</code></pre>`;
        }
        
        // Render options list. If not shuffled yet for this session question item, build option map
        if (!q._shuffledOptions) {
            let optsMap = q.options.map(o => ({ text: o, isCorrect: o === q.answer }));
            shuffleArray(optsMap);
            q._shuffledOptions = optsMap;
        }

        html += `<ul class="options-list">`;
        q._shuffledOptions.forEach((option, idx) => {
            let checked = userAnswers[currentQuestionIndex] === idx ? 'checked' : '';
            let disabled = stateSubmitted[currentQuestionIndex] ? 'disabled' : '';
            html += `
                <li class="option-item">
                    <label class="option-label">
                        <input type="radio" name="option" value="${idx}" ${checked} ${disabled}>
                        <span>${escapeHtml(option.text)}</span>
                    </label>
                </li>
            `;
        });
        html += `</ul>`;
        html += `<div id="explanation" class="explanation-box"></div>`;
        
        document.getElementById('question-container').innerHTML = html;
        document.getElementById('prev-btn').disabled = currentQuestionIndex === 0;
        
        const actionBtn = document.getElementById('action-btn');
        if (stateSubmitted[currentQuestionIndex]) {
            showExplanationBox();
            actionBtn.innerText = (currentQuestionIndex === sessionQuestions.length - 1) ? "Finish Exam" : "Next Question";
        } else {
            actionBtn.innerText = "Submit Answer";
        }
    }

    function handleActionClick() {
        if (!stateSubmitted[currentQuestionIndex]) {
            const selectedOpt = document.querySelector('input[name="option"]:checked');
            if (!selectedOpt) {
                alert("Please select an option before submitting.");
                return;
            }
            
            const answerIdx = parseInt(selectedOpt.value);
            userAnswers[currentQuestionIndex] = answerIdx;
            stateSubmitted[currentQuestionIndex] = true;
            
            showExplanationBox();
            
            const actionBtn = document.getElementById('action-btn');
            actionBtn.innerText = (currentQuestionIndex === sessionQuestions.length - 1) ? "Finish Exam" : "Next Question";
            showQuestion();
        } else {
            if (currentQuestionIndex === sessionQuestions.length - 1) {
                clearInterval(timerInterval);
                calculateResults();
            } else {
                currentQuestionIndex++;
                showQuestion();
            }
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            showQuestion();
        }
    }

    function showExplanationBox() {
        const q = sessionQuestions[currentQuestionIndex];
        const selectedIdx = userAnswers[currentQuestionIndex];
        const expBox = document.getElementById('explanation');
        
        if (!expBox || selectedIdx === null) return;
        
        const isCorrect = q._shuffledOptions[selectedIdx].isCorrect;
        
        if (isCorrect) {
            expBox.className = "explanation-box correct";
            expBox.innerHTML = `<strong>Correct!</strong> ${q.explanation}`;
        } else {
            expBox.className = "explanation-box incorrect";
            expBox.innerHTML = `<strong>Incorrect.</strong> The correct choice was: <em>${escapeHtml(q.answer)}</em>.<br><br>${q.explanation}`;
        }
        expBox.style.display = "block";
    }

    function calculateResults() {
        document.getElementById('quiz-screen').style.display = "none";
        document.getElementById('results-screen').style.display = "block";
        
        let correctCount = 0;
        let domainStats = {};
        
        // Bootstrap tracking objects based on explicit blueprint names
        blueprint.forEach(b => domainStats[b.domain] = { correct: 0, total: 0 });

        sessionQuestions.forEach((q, idx) => {
            const selectedIdx = userAnswers[idx];
            const isCorrect = selectedIdx !== null && q._shuffledOptions[selectedIdx].isCorrect;
            
            domainStats[q.domain].total++;
            if (isCorrect) {
                correctCount++;
                domainStats[q.domain].correct++;
            }
        });
        
        const finalPct = Math.round((correctCount / sessionQuestions.length) * 100);
        document.getElementById('final-score').innerText = `${finalPct}%`;
        
        const statusEl = document.getElementById('pass-fail-status');
        if (finalPct >= 75) {
            statusEl.innerText = "PASSED";
            statusEl.style.color = "var(--success-color)";
        } else {
            statusEl.innerText = "FAILED";
            statusEl.style.color = "var(--error-color)";
        }
        
        const tbody = document.querySelector('#breakdown-table tbody');
        tbody.innerHTML = "";
        for (const [domain, stats] of Object.entries(domainStats)) {
            let pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
            tbody.innerHTML += `<tr><td>${domain}</td><td>${stats.correct} / ${stats.total}</td><td><strong>${pct}%</strong></td></tr>`;
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    window.onload = initQuiz;
</script>
