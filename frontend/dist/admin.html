<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCSA Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .admin-nav .btn { min-width: 120px; }
        .admin-nav .btn-secondary { background-color: #6c757d; }
        .admin-nav .btn-secondary:hover { background-color: #5a6268; }
        .admin-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .admin-table th, .admin-table td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
        .admin-table th { background-color: #f8f9fa; }
        .admin-table tr:hover { background-color: #f1f8ff; }
        .action-btn { padding: 4px 8px; margin: 0 2px; font-size: 0.85rem; cursor: pointer; }
        .edit-btn { background-color: #ffc107; color: #000; border: none; border-radius: 3px; }
        .delete-btn { background-color: #dc3545; color: white; border: none; border-radius: 3px; }
        .stats-card { display: inline-block; padding: 15px; margin: 5px; border: 1px solid var(--border-color); border-radius: 6px; min-width: 150px; text-align: center; }
        .stats-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .stats-card .value { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); }
        .modal-content { background-color: #fff; margin: 5% auto; padding: 20px; border: 1px solid var(--border-color); border-radius: 8px; width: 80%; max-width: 600px; }
        .modal-close { float: right; font-size: 1.5rem; cursor: pointer; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 4px; }
        .form-group textarea { min-height: 100px; }
        .options-input { margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KCSA Admin Panel</h1>

        <div class="admin-nav">
            <button class="btn" onclick="adminPanel.showSection('questions')">Questions</button>
            <button class="btn btn-secondary" onclick="adminPanel.showSection('sessions')">Sessions</button>
            <button class="btn btn-secondary" onclick="adminPanel.showSection('stats')">Statistics</button>
        </div>

        <div id="questions-section">
            <h2>Question Management</h2>
            <button class="btn" onclick="adminPanel.showAddQuestion()">Add New Question</button>
            <table class="admin-table" id="questions-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Domain</th>
                        <th>Question</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="questions-tbody"></tbody>
            </table>
        </div>

        <div id="sessions-section" style="display:none;">
            <h2>Exam Sessions</h2>
            <table class="admin-table" id="sessions-table">
                <thead>
                    <tr>
                        <th>Session ID</th>
                        <th>Created</th>
                        <th>Score</th>
                        <th>Result</th>
                    </tr>
                </thead>
                <tbody id="sessions-tbody"></tbody>
            </table>
        </div>

        <div id="stats-section" style="display:none;">
            <h2>Aggregate Statistics</h2>
            <div id="stats-cards"></div>
            <h3>Performance by Domain</h3>
            <table class="admin-table" id="domain-stats-table">
                <thead>
                    <tr>
                        <th>Domain</th>
                        <th>Total</th>
                        <th>Correct</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody id="domain-stats-tbody"></tbody>
            </table>
        </div>
    </div>

    <div id="question-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close" onclick="adminPanel.closeModal()">&times;</span>
            <h2 id="modal-title">Add Question</h2>
            <form id="question-form">
                <input type="hidden" id="edit-question-id">
                <div class="form-group">
                    <label for="question-domain">Domain</label>
                    <select id="question-domain" required>
                        <option value="Overview of Cloud Native Security (14%)">Overview of Cloud Native Security (14%)</option>
                        <option value="Kubernetes Cluster Component Security (22%)">Kubernetes Cluster Component Security (22%)</option>
                        <option value="Kubernetes Security Fundamentals (22%)">Kubernetes Security Fundamentals (22%)</option>
                        <option value="Kubernetes Threat Model (16%)">Kubernetes Threat Model (16%)</option>
                        <option value="Platform Security (16%)">Platform Security (16%)</option>
                        <option value="Compliance and Security Frameworks (10%)">Compliance and Security Frameworks (10%)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="question-text">Question Text</label>
                    <textarea id="question-text" required></textarea>
                </div>
                <div class="form-group">
                    <label for="question-code">Code Block (optional)</label>
                    <textarea id="question-code" placeholder="Paste YAML or code here..."></textarea>
                </div>
                <div class="form-group">
                    <label>Options</label>
                    <div class="options-input"><input type="text" id="option-0" placeholder="Option A" required></div>
                    <div class="options-input"><input type="text" id="option-1" placeholder="Option B" required></div>
                    <div class="options-input"><input type="text" id="option-2" placeholder="Option C" required></div>
                    <div class="options-input"><input type="text" id="option-3" placeholder="Option D" required></div>
                </div>
                <div class="form-group">
                    <label for="correct-answer">Correct Answer</label>
                    <select id="correct-answer" required></select>
                </div>
                <div class="form-group">
                    <label for="question-explanation">Explanation</label>
                    <textarea id="question-explanation" required></textarea>
                </div>
                <button type="submit" class="btn">Save Question</button>
            </form>
        </div>
    </div>

    <script src="/js/admin.js"></script>
    <script>
        const adminPanel = new AdminPanel();
        adminPanel.init();
    </script>
</body>
</html>
