version: '3.8'

services:
  backend:
    build: ./backend
    container_name: kcsa-backend
    ports:
      - "8000:8000"
    environment:
      - ADMIN_USER=${ADMIN_USER}
      - ADMIN_PASS=${ADMIN_PASS}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: kcsa-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped
